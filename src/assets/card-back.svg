<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 860" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c07d34"/>
      <stop offset="0.45" stop-color="#9a5a22"/>
      <stop offset="1" stop-color="#5e3413"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#e0a95e" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#e0a95e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.5" stop-color="#e7b45a"/>
      <stop offset="1" stop-color="#a9781f"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="590" height="860" fill="url(#bg)"/>
  <rect width="590" height="860" fill="url(#glow)"/>

  <!-- Cadres ornés -->
  <rect x="20" y="20" width="550" height="820" rx="14" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <rect x="36" y="36" width="518" height="788" rx="9" fill="none" stroke="#3f2410" stroke-width="3"/>
  <rect x="46" y="46" width="498" height="768" rx="7" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>

  <!-- Losanges décoratifs aux coins -->
  <g fill="url(#gold)">
    <path d="M295 60 l 16 16 l -16 16 l -16 -16 z"/>
    <path d="M295 800 l 16 16 l -16 16 l -16 -16 z"/>
    <path d="M64 430 l 16 16 l -16 16 l -16 -16 z"/>
    <path d="M526 430 l 16 16 l -16 16 l -16 -16 z"/>
  </g>

  <!-- Médaillon central -->
  <g transform="translate(295 430)">
    <circle r="168" fill="#6d3f18"/>
    <circle r="168" fill="none" stroke="url(#gold)" stroke-width="7"/>
    <circle r="140" fill="none" stroke="#3f2410" stroke-width="3"/>
    <circle r="150" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

    <!-- Rayons -->
    <g stroke="url(#gold)" stroke-width="3" opacity="0.35">
      <line x1="0" y1="-140" x2="0" y2="-118"/>
      <line x1="0" y1="140" x2="0" y2="118"/>
      <line x1="-140" y1="0" x2="-118" y2="0"/>
      <line x1="140" y1="0" x2="118" y2="0"/>
      <line x1="-99" y1="-99" x2="-83" y2="-83"/>
      <line x1="99" y1="-99" x2="83" y2="-83"/>
      <line x1="-99" y1="99" x2="-83" y2="83"/>
      <line x1="99" y1="99" x2="83" y2="83"/>
    </g>

    <!-- Œil Oudjat stylisé -->
    <g fill="url(#gold)">
      <!-- Sourcil -->
      <path d="M-96 -46 q 70 -34 150 -6 q -74 -6 -150 22 z"/>
      <!-- Paupière supérieure + amande -->
      <path d="M-104 6 q 74 -60 168 -30 q 26 8 34 26 q -14 6 -34 4 q -70 -32 -140 -2 q -22 8 -28 2 z"/>
      <!-- Paupière inférieure -->
      <path d="M-104 6 q 60 44 132 26 q 30 -8 42 -30 q -70 34 -146 8 q -20 -6 -28 -4 z"/>
      <!-- Larme verticale -->
      <path d="M-16 40 l -14 78 l 22 -14 l 8 -58 z"/>
      <!-- Volute -->
      <path d="M40 40 q 24 20 20 58 q -3 30 -30 44 q 34 -26 22 -64 q -6 -22 -32 -30 z"/>
    </g>
    <!-- Iris -->
    <circle cx="-2" cy="2" r="30" fill="#3f2410"/>
    <circle cx="-2" cy="2" r="30" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="-11" cy="-7" r="7" fill="#ffe9a8" opacity="0.8"/>
  </g>
</svg>
